<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idea Puzzle</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6fb;
        --sidebar: #1f2937;
        --sidebar-accent: #374151;
        --topbar: #ffffff;
        --text: #111827;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 180px;
        background: var(--sidebar);
        color: #f9fafb;
        padding: 20px 12px;
      }

      .brand {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 24px;
      }

      .nav-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .nav-links a {
        color: #d1d5db;
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 8px;
        transition: background 0.2s ease;
      }

      .nav-links a:hover {
        background: var(--sidebar-accent);
        color: #ffffff;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: var(--topbar);
        border-bottom: 1px solid #e5e7eb;
      }

      .topbar-title {
        font-size: 1rem;
        font-weight: 600;
      }

      .topbar-actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        color: var(--text);
        width: 36px;
        height: 36px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .icon-btn:hover {
        background: #e5e7eb;
      }

      .ai-btn {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 52px;
        height: 52px;
        border: none;
        border-radius: 50%;
        background: #2563eb;
        color: #ffffff;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
        cursor: pointer;
        z-index: 1000;
      }

      .ai-btn:hover {
        background: #1d4ed8;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        width: min(480px, calc(100% - 40px));
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        overflow: hidden;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
        background: #f8fafc;
      }

      .modal-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        color: #111827;
      }

      .modal-close {
        border: none;
        background: transparent;
        color: #6b7280;
        font-size: 1.1rem;
        cursor: pointer;
      }

      .modal-body {
        padding: 20px 24px 24px;
        color: #374151;
        line-height: 1.6;
      }

      .modal-body p {
        margin: 0 0 12px;
      }

      .settings-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .settings-label {
        font-size: 0.95rem;
        font-weight: 600;
        color: #111827;
      }

      .settings-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 0.95rem;
      }

      .settings-input-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .settings-toggle {
        align-self: flex-start;
        border: 1px solid #d1d5db;
        background: #f9fafb;
        color: #374151;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .settings-select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 0.95rem;
        background: #ffffff;
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 4px;
      }

      .settings-btn {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }

      .settings-btn.primary {
        background: #2563eb;
        color: #ffffff;
      }

      .settings-btn.secondary {
        background: #f3f4f6;
        color: #374151;
      }

      .content {
        padding: 24px;
        flex: 1;
      }

      .board {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 480px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #fffdf5 0%, #fef2f2 45%, #eef7ff 100%);
        overflow: hidden;
        cursor: grab;
      }

      .board.dragging {
        cursor: grabbing;
      }

      .board::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
        background-size: 24px 24px;
        pointer-events: none;
      }

      .board-content {
        position: absolute;
        width: 5000px;
        height: 5000px;
        transform-origin: 0 0;
        will-change: transform;
      }

      .board-viewport {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .sticky-note {
        position: absolute;
        width: 140px;
        height: 120px;
        padding: 12px;
        background: #fde68a;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        font-size: 0.95rem;
        line-height: 1.4;
        color: #4b5563;
        cursor: grab;
        user-select: none;
        transform: rotate(-2deg);
      }

      .sticky-note.question {
        background: #dbeafe;
        color: #1e3a8a;
        border: 1px solid #93c5fd;
      }

      .sticky-note:active {
        cursor: grabbing;
      }
      .sticky-note.selected {
        box-shadow: 0 12px 30px rgba(59,130,246,0.18);
        outline: 3px solid rgba(59,130,246,0.35);
        transform: rotate(0deg);
      }

      .note-text {
        width: 100%;
        height: 100%;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        outline: none;
        cursor: text;
      }

      .marquee {
        position: absolute;
        border: 2px dashed rgba(59,130,246,0.6);
        background: rgba(59,130,246,0.08);
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">Idea Puzzle</div>
        <nav class="nav-links">
          <a href="#" id="word-item">단어</a>
          <a href="#" id="question-item">질문</a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-title">대시보드</div>
          <div class="topbar-actions">
            <button class="icon-btn" aria-label="파일">☰</button>
          <button id="settings-btn" class="icon-btn" aria-label="설정">⚙</button>
        </header>

        <section class="content">
          <div class="board" id="board">
            <div class="board-viewport">
              <div class="board-content" id="board-content"></div>
            </div>
          </div>
        </section>
      </main>
      <button id="ai-btn" class="ai-btn" type="button" aria-label="AI 도움">🤖</button>
      <div id="settings-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
        <div class="modal">
          <div class="modal-header">
            <h2 id="settings-modal-title" class="modal-title">설정</h2>
            <button id="settings-close" class="modal-close" aria-label="닫기">✕</button>
          </div>
          <div class="modal-body">
            <form class="settings-form" id="settings-form">
              <label class="settings-label" for="api-key-input">Google AI API Key</label>
              <div class="settings-input-wrap">
                <input id="api-key-input" class="settings-input" type="password" placeholder="API 키를 입력하세요" />
                <button type="button" class="settings-toggle" id="api-key-toggle" aria-label="API 키 보기">API 키 표시</button>
              </div>

              <label class="settings-label" for="note-font-size">포스트잇 텍스트 크기</label>
              <select id="note-font-size" class="settings-select">
                <option value="12">12px</option>
                <option value="14">14px</option>
                <option value="16">16px</option>
                <option value="18">18px</option>
                <option value="20">20px</option>
              </select>

              <div class="settings-actions">
                <button type="button" class="settings-btn secondary" id="settings-cancel">취소</button>
                <button type="submit" class="settings-btn primary">저장</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      const wordItem = document.getElementById('word-item');
      const questionItem = document.getElementById('question-item');
      const board = document.getElementById('board');
      const boardContent = document.getElementById('board-content');
      const settingsBtn = document.getElementById('settings-btn');
      const settingsModal = document.getElementById('settings-modal');
      const settingsClose = document.getElementById('settings-close');
      const settingsCancel = document.getElementById('settings-cancel');
      const settingsForm = document.getElementById('settings-form');
      const apiKeyInput = document.getElementById('api-key-input');
      const apiKeyToggle = document.getElementById('api-key-toggle');
      const noteFontSizeSelect = document.getElementById('note-font-size');
      const aiBtn = document.getElementById('ai-btn');

      const STORAGE_KEY = 'idea-puzzle-google-ai-key';
      const FONT_SIZE_KEY = 'idea-puzzle-note-font-size';
      let googleApiKey = localStorage.getItem(STORAGE_KEY) || '';
      let noteFontSize = Number(localStorage.getItem(FONT_SIZE_KEY) || '16');
      let aiClient = null;

      function createAiClient(apiKey) {
        if (!apiKey) return null;
        try {
          if (window.GoogleGenAI) {
            return new window.GoogleGenAI({ apiKey });
          }
          if (window.google && window.google.genai) {
            return new window.google.genai.GoogleGenAI({ apiKey });
          }
          return null;
        } catch (error) {
          console.error('Failed to initialize Google AI client:', error);
          return null;
        }
      }

      if (googleApiKey) {
        aiClient = createAiClient(googleApiKey);
      }

      apiKeyInput.value = googleApiKey;
      noteFontSizeSelect.value = String(noteFontSize);

      function applyNoteFontSize() {
        document.documentElement.style.setProperty('--note-font-size', `${noteFontSize}px`);
        for (const note of notes) {
          const textEl = note.querySelector('.note-text');
          if (textEl) {
            textEl.style.fontSize = `${noteFontSize}px`;
          }
        }
      }

      function openSettings() {
        apiKeyInput.value = googleApiKey;
        noteFontSizeSelect.value = String(noteFontSize);
        settingsModal.classList.add('active');
      }

      function closeSettings() {
        settingsModal.classList.remove('active');
      }

      const boardWidth = 5000;
      const boardHeight = 5000;
      const notes = [];
      const camera = { x: 0, y: 0, scale: 1 };
      let draggedNote = null;
      let dragOffsetX = 0;
      let dragOffsetY = 0;
      let panning = false;
      let panStartX = 0;
      let panStartY = 0;
      let panOriginX = 0;
      let panOriginY = 0;
      const selected = new Set();
      let dragStartPoint = null;
      const initialPositions = new Map();
      let marquee = null;
      let marqueeStart = null;
      let isMarquee = false;
      let marqueeAdd = false;
      let potentialPan = false;
      const panThreshold = 6;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function clampCamera() {
        const rect = board.getBoundingClientRect();
        const vw = rect.width;
        const vh = rect.height;
        const scaledW = boardWidth * camera.scale;
        const scaledH = boardHeight * camera.scale;

        if (scaledW <= vw) {
          camera.x = (vw - scaledW) / 2;
        } else {
          const minX = vw - scaledW;
          camera.x = clamp(camera.x, minX, 0);
        }

        if (scaledH <= vh) {
          camera.y = (vh - scaledH) / 2;
        } else {
          const minY = vh - scaledH;
          camera.y = clamp(camera.y, minY, 0);
        }
      }

      function updateBoardTransform() {
        clampCamera();
        boardContent.style.transform = `translate(${camera.x}px, ${camera.y}px) scale(${camera.scale})`;
      }

      function screenToBoardPoint(event) {
        const rect = board.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left - camera.x) / camera.scale,
          y: (event.clientY - rect.top - camera.y) / camera.scale,
        };
      }

      function viewportCenterToBoardPoint() {
        const rect = board.getBoundingClientRect();
        return {
          x: (rect.width / 2 - camera.x) / camera.scale,
          y: (rect.height / 2 - camera.y) / camera.scale,
        };
      }

      function setNotePosition(note, x, y) {
        const maxX = Math.max(0, boardWidth - note.offsetWidth - 12);
        const maxY = Math.max(0, boardHeight - note.offsetHeight - 12);
        const nextX = clamp(x, 12, maxX);
        const nextY = clamp(y, 12, maxY);

        note.dataset.x = nextX;
        note.dataset.y = nextY;
        note.style.left = `${nextX}px`;
        note.style.top = `${nextY}px`;
      }

      function clearSelection() {
        for (const n of Array.from(selected)) {
          n.classList.remove('selected');
        }
        selected.clear();
      }

      function addToSelection(note) {
        selected.add(note);
        note.classList.add('selected');
      }

      function removeFromSelection(note) {
        selected.delete(note);
        note.classList.remove('selected');
      }

      function startPan(event) {
        panning = true;
        board.classList.add('dragging');
        panStartX = event.clientX;
        panStartY = event.clientY;
        panOriginX = camera.x;
        panOriginY = camera.y;
      }

      function startMarquee(event) {
        isMarquee = true;
        marqueeAdd = event.shiftKey === true;
        marqueeStart = screenToBoardPoint(event);
        marquee = document.createElement('div');
        marquee.className = 'marquee';
        marquee.style.left = `${marqueeStart.x}px`;
        marquee.style.top = `${marqueeStart.y}px`;
        marquee.style.width = `0px`;
        marquee.style.height = `0px`;
        boardContent.appendChild(marquee);
      }

      function updateMarquee(event) {
        if (!isMarquee) return;
        const p = screenToBoardPoint(event);
        const x = Math.min(marqueeStart.x, p.x);
        const y = Math.min(marqueeStart.y, p.y);
        const w = Math.abs(p.x - marqueeStart.x);
        const h = Math.abs(p.y - marqueeStart.y);
        marquee.style.left = `${x}px`;
        marquee.style.top = `${y}px`;
        marquee.style.width = `${w}px`;
        marquee.style.height = `${h}px`;
      }

      function endMarquee() {
        if (!isMarquee) return;
        const start = { x: parseFloat(marquee.style.left), y: parseFloat(marquee.style.top) };
        const end = { x: start.x + parseFloat(marquee.style.width), y: start.y + parseFloat(marquee.style.height) };
        if (!marqueeAdd) clearSelection();
        for (const n of notes) {
          const nx = Number(n.dataset.x || 0);
          const ny = Number(n.dataset.y || 0);
          if (nx >= start.x && nx <= end.x && ny >= start.y && ny <= end.y) {
            addToSelection(n);
          }
        }
        marquee.remove();
        marquee = null;
        isMarquee = false;
        marqueeAdd = false;
      }

      function updatePan(event) {
        if (!panning) return;
        camera.x = panOriginX + (event.clientX - panStartX);
        camera.y = panOriginY + (event.clientY - panStartY);
        updateBoardTransform();
      }

      function getNoteText(note) {
        return note?.querySelector('.note-text')?.textContent?.trim() || '';
      }

      function normalizeSuggestion(item) {
        if (typeof item === 'string') {
          const trimmed = item.trim();
          if (!trimmed) return '';

          return trimmed
            .replace(/^['"“”‘’]+|['"“”‘’]+$/g, '')
            .replace(/^\s*[-•]\s*/, '')
            .replace(/^\s*"/, '')
            .replace(/"\s*$/, '')
            .trim();
        }

        if (item && typeof item === 'object') {
          const values = Object.values(item)
            .map((value) => String(value || '').trim())
            .filter(Boolean);
          return values.join(' / ');
        }

        return '';
      }

      function extractJsonPayload(text) {
        const cleaned = String(text || '')
          .replace(/```json|```/g, '')
          .trim();

        const candidates = [];
        const arrayMatch = cleaned.match(/\[[\s\S]*\]/);
        const objectMatch = cleaned.match(/\{[\s\S]*\}/);
        if (arrayMatch) candidates.push(arrayMatch[0]);
        if (objectMatch) candidates.push(objectMatch[0]);

        for (const candidate of candidates) {
          try {
            return JSON.parse(candidate);
          } catch (error) {
            // try next candidate
          }
        }

        return null;
      }

      async function generateAiSuggestions(rootText, contextTexts) {
        if (!googleApiKey) {
          openSettings();
          throw new Error('API 키가 필요합니다.');
        }

        const prompt = `당신은 아이디어 확장 도우미입니다. 아래 루트 아이디어와 기존 보드 단어를 보고, 하나의 아이디어 프로젝트를 더 풍부하게 확장할 수 있는 단어 3개를 제안하세요. 한국어로만 답하고, 각 단어는 1~3단어로 작성하세요. 출력은 오직 JSON 배열 문자열만 반환하세요. 예시: {["게임", "플레이", "도전"]}.서두(예시: "Here is the JSON requested:"), 절대 설명 문구, 코드 블록, 번호, 또는 추가 텍스트를 포함하지 마세요.\n루트: ${rootText}\n컨텍스트: ${contextTexts.join('/')}`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(googleApiKey)}`, {
          method: 'POST',
          //headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              temperature: 0.2,
              topP: 0.9,
              maxOutputTokens: 220,
              responseMimeType: 'application/json'
            }
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error?.message || 'AI 응답 실패');
        }

        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
        console.log('AI raw response:', rawText);

        const parsed = extractJsonPayload(rawText);
        if (Array.isArray(parsed)) {
          return parsed
            .filter(Boolean)
            .slice(0, 3)
            .map(normalizeSuggestion)
            .filter(Boolean);
        }

        const cleaned = String(rawText || '')
          .replace(/```json|```/g, '')
          .replace(/^\s*\[\s*/, '[')
          .replace(/\s*\]\s*$/, ']')
          .trim();
        console.log('AI cleaned response:', cleaned);

        const objectMatches = [...cleaned.matchAll(/\{[^{}]*\}/g)];
        if (objectMatches.length > 0) {
          const structured = objectMatches.map((match) => normalizeSuggestion(match[0])).filter(Boolean);
          if (structured.length > 0) {
            return structured.slice(0, 3);
          }
        }

        const fallback = cleaned
          .replace(/^\[|\]$/g, '')
          .split(/\n|•|-|,|\s{2,}/)
          .map(normalizeSuggestion)
          .filter(Boolean)
          .slice(0, 3);

        return fallback;
      }

      function addNote(x = null, y = null, type = 'normal') {
        const point = x === null || y === null ? viewportCenterToBoardPoint() : { x, y };
        const note = document.createElement('div');
        note.className = `sticky-note${type === 'question' ? ' question' : ''}`;
        note.style.left = `${point.x}px`;
        note.style.top = `${point.y}px`;
        // inner editable text area
        const text = document.createElement('div');
        text.className = 'note-text';
        text.style.fontSize = `${noteFontSize}px`;
        text.textContent = type === 'question' ? '질문 포스트잇' : `포스트잇 ${notes.length + 1}`;
        text.contentEditable = 'false';
        note.appendChild(text);
        note.addEventListener('mousedown', startDrag);

        // double-click to edit
        text.addEventListener('dblclick', function(ev) {
          ev.stopPropagation();
          text.contentEditable = 'true';
          note.isEditing = true;
          text.focus();
          // move caret to end
          const range = document.createRange();
          range.selectNodeContents(text);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        });

        // finish editing on blur or Enter (without Shift)
        text.addEventListener('blur', function() {
          text.contentEditable = 'false';
          note.isEditing = false;
        });
        text.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            text.blur();
          }
        });

        boardContent.appendChild(note);

        notes.push(note);
        setNotePosition(note, point.x, point.y);
        return note;
      }

      function startDrag(event) {
        // allow clicks into contentEditable text to proceed normally
        if (this.isEditing || (event.target && event.target.isContentEditable)) return;

        event.preventDefault();
        event.stopPropagation();

        // Selection behavior on mousedown: Ctrl/Cmd toggles, Shift adds, otherwise select single
        if (event.ctrlKey || event.metaKey) {
          if (selected.has(this)) removeFromSelection(this);
          else addToSelection(this);
        } else if (event.shiftKey) {
          if (!selected.has(this)) addToSelection(this);
        } else {
          if (!selected.has(this)) {
            clearSelection();
            addToSelection(this);
          }
        }

        draggedNote = this;
        panning = false;
        dragStartPoint = screenToBoardPoint(event);
        initialPositions.clear();
        for (const n of selected) {
          initialPositions.set(n, { x: Number(n.dataset.x || 0), y: Number(n.dataset.y || 0) });
        }
      }

      wordItem.addEventListener('click', function (event) {
        event.preventDefault();
        addNote();
      });

      questionItem.addEventListener('click', function (event) {
        event.preventDefault();
        addNote(null, null, 'question');
      });

      aiBtn.addEventListener('click', async function () {
        const selectedNotes = Array.from(selected);
        const contextNotes = selectedNotes.length > 0 ? selectedNotes : notes;
        const rootNote = contextNotes[0];
        const rootText = getNoteText(rootNote) || '아이디어';
        const contextTexts = contextNotes.map(getNoteText).filter(Boolean);

        if (contextTexts.length === 0) {
          alert('먼저 포스트잇을 추가해 주세요.');
          return;
        }

        aiBtn.disabled = true;
        aiBtn.textContent = '…';

        try {
          const suggestions = await generateAiSuggestions(rootText, contextTexts);
          const baseX = Number(rootNote?.dataset.x || 0);
          const baseY = Number(rootNote?.dataset.y || 0);

          suggestions.forEach((suggestion, index) => {
            const offsetX = 220 + index * 40;
            const offsetY = index % 2 === 0 ? -90 : 70;
            const newNote = addNote(baseX + offsetX, baseY + offsetY);
            const textEl = newNote.querySelector('.note-text');
            if (textEl) {
              textEl.textContent = suggestion;
            }
          });
        } catch (error) {
          console.error(error);
          alert(error.message || 'AI 추천을 불러오지 못했습니다.');
        } finally {
          aiBtn.disabled = false;
          aiBtn.textContent = '🤖';
        }
      });

      apiKeyToggle.addEventListener('click', function () {
        const isPassword = apiKeyInput.type === 'password';
        apiKeyInput.type = isPassword ? 'text' : 'password';
        apiKeyToggle.textContent = isPassword ? 'API 키 숨기기' : 'API 키 표시';
      });

      settingsBtn.addEventListener('click', openSettings);

      settingsClose.addEventListener('click', closeSettings);
      settingsCancel.addEventListener('click', closeSettings);

      settingsForm.addEventListener('submit', function (event) {
        event.preventDefault();
        googleApiKey = apiKeyInput.value.trim();
        noteFontSize = Number(noteFontSizeSelect.value) || 16;
        localStorage.setItem(STORAGE_KEY, googleApiKey);
        localStorage.setItem(FONT_SIZE_KEY, String(noteFontSize));
        aiClient = createAiClient(googleApiKey);
        applyNoteFontSize();
        closeSettings();
      });

      settingsModal.addEventListener('click', function (event) {
        if (event.target === settingsModal) {
          closeSettings();
        }
      });

      board.addEventListener('mousedown', function (event) {
        // left button: potential pan (starts after threshold)
        if (event.button === 0) {
          if (event.target === board) {
            potentialPan = true;
            panStartX = event.clientX;
            panStartY = event.clientY;
            panOriginX = camera.x;
            panOriginY = camera.y;
          } else if (event.target === boardContent) {
            // begin marquee selection when clicking on empty board-content
            startMarquee(event);
          }
          return;
        }

        // middle button (wheel): start immediate panning
        if (event.button === 1) {
          event.preventDefault();
          potentialPan = false;
          panning = true;
          board.classList.add('dragging');
          panStartX = event.clientX;
          panStartY = event.clientY;
          panOriginX = camera.x;
          panOriginY = camera.y;
          return;
        }
      });

      board.addEventListener('mousemove', function (event) {
        if (isMarquee) {
          updateMarquee(event);
          return;
        }

        // if we pressed on board and moved, start panning after threshold
        if (potentialPan && !panning) {
          const dx = Math.abs(event.clientX - panStartX);
          const dy = Math.abs(event.clientY - panStartY);
          if (dx >= panThreshold || dy >= panThreshold) {
            panning = true;
            potentialPan = false;
            board.classList.add('dragging');
            panOriginX = camera.x;
            panOriginY = camera.y;
          }
        }

        if (!draggedNote && panning) {
          updatePan(event);
        }
      });

      board.addEventListener('mouseup', function () {
        if (isMarquee) {
          endMarquee();
        }
        panning = false;
        potentialPan = false;
        board.classList.remove('dragging');
      });

      board.addEventListener('mouseleave', function () {
        if (isMarquee) {
          endMarquee();
        }
        panning = false;
        potentialPan = false;
        board.classList.remove('dragging');
      });

      board.addEventListener('wheel', function (event) {
        event.preventDefault();
        const rect = board.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        // world point under mouse before zoom
        const worldX = (mouseX - camera.x) / camera.scale;
        const worldY = (mouseY - camera.y) / camera.scale;

        const delta = event.deltaY > 0 ? -0.1 : 0.1;
        camera.scale = clamp(camera.scale + delta, 0.7, 2.2);

        // move camera so that world point stays under mouse
        camera.x = mouseX - worldX * camera.scale;
        camera.y = mouseY - worldY * camera.scale;

        updateBoardTransform();
      }, { passive: false });

      document.addEventListener('mousemove', function (event) {
        if (!draggedNote) return;
        const point = screenToBoardPoint(event);
        const dx = point.x - dragStartPoint.x;
        const dy = point.y - dragStartPoint.y;
        for (const n of selected) {
          const init = initialPositions.get(n) || { x: Number(n.dataset.x || 0), y: Number(n.dataset.y || 0) };
          setNotePosition(n, init.x + dx, init.y + dy);
        }
      });

      document.addEventListener('mouseup', function () {
        draggedNote = null;
        panning = false;
        board.classList.remove('dragging');
      });

      // delete selected notes with Delete/Backspace (but ignore when editing)
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Delete' || event.key === 'Backspace') {
          // if focus is inside an editable text area, ignore
          const ae = document.activeElement;
          if (ae && (ae.isContentEditable || (ae.classList && ae.classList.contains('note-text')))) return;

          // if any selected note is in editing mode, ignore
          for (const n of selected) {
            if (n.isEditing) return;
          }

          if (selected.size === 0) return;
          event.preventDefault();
          for (const n of Array.from(selected)) {
            const idx = notes.indexOf(n);
            if (idx !== -1) notes.splice(idx, 1);
            n.remove();
            selected.delete(n);
          }
        }
      });

      updateBoardTransform();
    </script>
  </body>
</html>
